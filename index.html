<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Калькулятор часов</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f5f7fb, #e8eefc);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #1f2937;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: #ffffff;
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtext {
      text-align: center;
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 15px;
    }

    input {
      width: 100%;
      padding: 15px 16px;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      font-size: 20px;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .small-hint {
      margin-top: 6px;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.4;
    }

    .result {
      margin-top: 22px;
      background: #f3f6ff;
      border-radius: 16px;
      padding: 18px;
      text-align: center;
    }

    .result-title {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .result-value {
      font-size: 38px;
      font-weight: 800;
      color: #111827;
    }

    .result-human {
      margin-top: 6px;
      font-size: 18px;
      font-weight: 700;
      color: #2563eb;
    }

    .hint {
      margin-top: 12px;
      font-size: 13px;
      color: #6b7280;
      text-align: center;
      line-height: 1.5;
    }

    .error {
      margin-top: 14px;
      text-align: center;
      color: #dc2626;
      font-size: 14px;
      min-height: 20px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Калькулятор часов</h1>

    <p class="subtext">
      Уақытты өзіңіз жазыңыз. Мысалы: 12:56 немесе 1256
    </p>

    <div class="field">
      <label for="startTime">Начало смены</label>
      <input
        type="text"
        id="startTime"
        value="12:56"
        inputmode="numeric"
        placeholder="12:56"
      />
      <div class="small-hint">Мысалы: 12:56 немесе 1256</div>
    </div>

    <div class="field">
      <label for="endTime">Окончание смены</label>
      <input
        type="text"
        id="endTime"
        value="21:12"
        inputmode="numeric"
        placeholder="21:12"
      />
      <div class="small-hint">Мысалы: 21:12 немесе 2112</div>
    </div>

    <div class="field">
      <label for="breakTime">Перерыв</label>
      <input
        type="text"
        id="breakTime"
        value="1"
        inputmode="decimal"
        placeholder="1 немесе 45"
      />
      <div class="small-hint">
        1 = 1 сағат, 2 = 2 сағат. Ал 30 немесе 45 = минут.
      </div>
    </div>

    <div class="error" id="error"></div>

    <div class="result">
      <div class="result-title">Итог</div>
      <div class="result-value" id="result">0,00</div>
      <div class="result-human" id="resultHuman">0 сағ 0 мин</div>
    </div>

    <div class="hint">
      Мысалы: 12:56–21:12, перерыв 1 болса, итог <b>7,27</b> болады.
    </div>
  </div>

  <script>
    const startInput = document.getElementById("startTime");
    const endInput = document.getElementById("endTime");
    const breakInput = document.getElementById("breakTime");
    const result = document.getElementById("result");
    const resultHuman = document.getElementById("resultHuman");
    const error = document.getElementById("error");

    function parseTimeToMinutes(value) {
      const raw = value.trim();

      if (!raw) return null;

      let hours;
      let minutes;

      // Егер 12:56, 12.56, 12 56 сияқты жазылса
      if (raw.includes(":") || raw.includes(".") || raw.includes(" ")) {
        const parts = raw.replace(/[.\s]+/g, ":").split(":");

        hours = Number(parts[0]);
        minutes = Number(parts[1] || 0);
      } else {
        // Егер 1256 немесе 956 деп жазылса
        const digits = raw.replace(/\D/g, "");

        if (digits.length <= 2) {
          hours = Number(digits);
          minutes = 0;
        } else {
          hours = Number(digits.slice(0, -2));
          minutes = Number(digits.slice(-2));
        }
      }

      if (
        Number.isNaN(hours) ||
        Number.isNaN(minutes) ||
        hours < 0 ||
        hours > 23 ||
        minutes < 0 ||
        minutes > 59
      ) {
        return null;
      }

      return hours * 60 + minutes;
    }

    function parseBreakToMinutes(value) {
      const raw = value.trim().replace(",", ".");

      if (!raw) return 0;

      // 1:30 деп жазса — 1 сағ 30 мин
      if (raw.includes(":")) {
        const [h, m] = raw.split(":").map(Number);

        if (Number.isNaN(h) || Number.isNaN(m)) return null;

        return h * 60 + m;
      }

      const number = Number(raw);

      if (Number.isNaN(number) || number < 0) {
        return null;
      }

      // Негізгі логика:
      // 1, 2, 1.5 сияқты кіші сандар — сағат
      // 30, 45, 60 сияқты сандар — минут
      if (number > 0 && number < 10) {
        return number * 60;
      }

      return number;
    }

    function formatDecimalHours(minutes) {
      return (minutes / 60).toFixed(2).replace(".", ",");
    }

    function formatHumanTime(minutes) {
      const h = Math.floor(minutes / 60);
      const m = Math.round(minutes % 60);

      return `${h} сағ ${m} мин`;
    }

    function formatTimeInput(input) {
      const minutes = parseTimeToMinutes(input.value);

      if (minutes === null) return;

      const h = Math.floor(minutes / 60);
      const m = minutes % 60;

      input.value = `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
    }

    function calculateHours() {
      error.textContent = "";

      const startMinutes = parseTimeToMinutes(startInput.value);
      let endMinutes = parseTimeToMinutes(endInput.value);
      const breakMinutes = parseBreakToMinutes(breakInput.value);

      if (startMinutes === null || endMinutes === null) {
        error.textContent = "Уақытты дұрыс енгізіңіз. Мысалы: 12:56 немесе 1256.";
        result.textContent = "0,00";
        resultHuman.textContent = "0 сағ 0 мин";
        return;
      }

      if (breakMinutes === null) {
        error.textContent = "Перерыв дұрыс емес. Мысалы: 1, 30 немесе 45.";
        result.textContent = "0,00";
        resultHuman.textContent = "0 сағ 0 мин";
        return;
      }

      // Егер смена түнге өтіп кетсе: 22:00–06:00
      if (endMinutes < startMinutes) {
        endMinutes += 24 * 60;
      }

      const workedMinutes = endMinutes - startMinutes - breakMinutes;

      if (workedMinutes < 0) {
        error.textContent = "Перерыв жұмыс уақытынан көп болып тұр.";
        result.textContent = "0,00";
        resultHuman.textContent = "0 сағ 0 мин";
        return;
      }

      result.textContent = formatDecimalHours(workedMinutes);
      resultHuman.textContent = formatHumanTime(workedMinutes);
    }

    // Кнопкасыз автомат есептеу
    startInput.addEventListener("input", calculateHours);
    endInput.addEventListener("input", calculateHours);
    breakInput.addEventListener("input", calculateHours);

    // Жазып болған соң уақытты әдемілеп 12:56 форматына келтіреді
    startInput.addEventListener("blur", () => {
      formatTimeInput(startInput);
      calculateHours();
    });

    endInput.addEventListener("blur", () => {
      formatTimeInput(endInput);
      calculateHours();
    });

    calculateHours();
  </script>
</body>
</html>
